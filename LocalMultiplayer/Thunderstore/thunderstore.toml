[config]
schemaVersion = "0.0.1"

[package]
namespace = "Zehs"
name = "LocalMultiplayer"
description = "Play multiplayer locally with one Steam account. Check the README for setup instructions."
websiteUrl = "https://github.com/ZehsTeam/REPO-LocalMultiplayer"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack = "5.4.2305"

[build]
icon = "./icon.png"
readme = "../../README.md"
outdir = "./Packages"

[[build.copy]]
source = "./CHANGELOG.md"
target = "/"

[[build.copy]]
source = "../../LocalMultiplayer/bin/Release/netstandard2.1/com.github.zehsteam.LocalMultiplayer.dll"
target = "BepInEx/plugins/"
